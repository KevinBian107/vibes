<!DOCTYPE html>
<html lang="en" data-theme="dark">
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("gpu-dashboard-theme") || "dark")</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPU Cluster Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
  <!-- Login screen -->
  <div id="login-screen">
    <div class="login-box">
      <h1>GPU Cluster Dashboard</h1>
      <p>Enter your SSH password to connect to all clusters.</p>
      <input type="password" id="password-input" placeholder="SSH password" autofocus>
      <button id="login-btn">Connect</button>
      <div id="login-status"></div>
    </div>
  </div>

  <!-- Main dashboard -->
  <div id="dashboard" class="hidden">
    <!-- Sidebar -->
    <aside id="sidebar">
      <h2>Clusters</h2>
      <ul id="cluster-list"></ul>
      <button id="logout-btn">Disconnect</button>
      <button id="theme-toggle">🌙</button>
    </aside>

    <!-- Main content -->
    <main id="main">
      <!-- Tab bar -->
      <nav id="tab-bar">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="gpu">GPU Detail</button>
        <button class="tab" data-tab="processes">Processes</button>
        <button class="tab" data-tab="terminal">Terminal</button>
        <button class="tab" data-tab="claude">Claude</button>
      </nav>

      <!-- Overview tab -->
      <section id="tab-overview" class="tab-content active">
        <div id="overview-cards"></div>
      </section>

      <!-- GPU detail tab -->
      <section id="tab-gpu" class="tab-content">
        <div id="gpu-detail"></div>
      </section>

      <!-- Processes tab -->
      <section id="tab-processes" class="tab-content">
        <div class="tab-toolbar">
          <label>Cluster:
            <select id="proc-cluster-select"></select>
          </label>
          <input type="text" id="proc-filter" placeholder="Filter processes...">
        </div>
        <div id="process-table-container">
          <table id="process-table">
            <thead>
              <tr>
                <th data-sort="user">User</th>
                <th data-sort="pid">PID</th>
                <th data-sort="cpu">%CPU</th>
                <th data-sort="mem">%MEM</th>
                <th data-sort="rss">RSS</th>
                <th data-sort="command">Command</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Terminal tab -->
      <section id="tab-terminal" class="tab-content">
        <div id="terminal-tabs"></div>
        <div id="terminal-container"></div>
      </section>

      <!-- Claude tab -->
      <section id="tab-claude" class="tab-content">
        <div class="tab-toolbar">
          <label>Cluster:
            <select id="claude-cluster-select"></select>
          </label>
          <button id="claude-connect-btn">Launch</button>
        </div>
        <div id="claude-body">
          <div id="claude-terminal-container"></div>
          <div id="file-explorer">
            <div id="file-explorer-header">
              <span id="file-explorer-path">/</span>
            </div>
            <div id="file-tree"></div>
            <div id="file-viewer" class="hidden">
              <div id="file-viewer-header">
                <span id="file-viewer-name"></span>
                <button id="file-viewer-close">x</button>
              </div>
              <div id="file-viewer-content"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
